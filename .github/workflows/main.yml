name: Build and Deploy Website

on:
  push:
    branches: [ main ]
    paths:
      - 'QT_API/**'
      - 'QT_FrontEnd/**'
      - '.github/workflows/docker-build-website.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'QT_API/**'
      - 'QT_FrontEnd/**'
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    environment: Docker
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Debug - Show file structure
      run: |
        echo "QT_API directory structure:"
        find ./QT_API -name "Dockerfile" -type f
        echo "QT_FrontEnd directory structure:"
        find ./QT_FrontEnd -name "Dockerfile" -type f
    
    # Copy Dockerfiles to expected locations
    - name: Copy API Dockerfile
      run: |
        mkdir -p ./QT_API/temp_build
        cp "./QT_API/Quintessence Website/Dockerfile" ./QT_API/temp_build/Dockerfile
        
    - name: Copy Frontend Dockerfile
      run: |
        mkdir -p ./QT_FrontEnd/temp_build
        cp "./QT_FrontEnd/QT_FrontEnd/Dockerfile" ./QT_FrontEnd/temp_build/Dockerfile
      
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
      
    - name: Login to DockerHub
      if: github.event_name != 'pull_request'
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
    
    # Build and push API image with simple path
    - name: Build and push API
      uses: docker/build-push-action@v4
      with:
        context: ./QT_API
        file: ./QT_API/temp_build/Dockerfile
        push: ${{ github.event_name != 'pull_request' }}
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/qt-api:latest, ${{ secrets.DOCKERHUB_USERNAME }}/qt-api:${{ github.sha }}
    
    # Build and push Frontend image with simple path
    - name: Build and push Frontend
      uses: docker/build-push-action@v4
      with:
        context: ./QT_FrontEnd
        file: ./QT_FrontEnd/temp_build/Dockerfile
        push: ${{ github.event_name != 'pull_request' }}
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/qt-frontend:latest, ${{ secrets.DOCKERHUB_USERNAME }}/qt-frontend:${{ github.sha }}
