name: Build and Deploy Website

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    environment: Docker
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Debug - Show API directory structure
      run: |
        echo "QT_API directory structure:"
        ls -la QT_API
        echo "Finding API project files:"
        find QT_API -name "*.csproj"
    
    - name: Debug - Show Frontend directory structure
      run: |
        echo "QT_FrontEnd directory structure:"
        ls -la QT_FrontEnd
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
    
    - name: Login to DockerHub
      if: github.event_name != 'pull_request'
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
    
    # Create a simple API Dockerfile that works with any project structure
    - name: Create API Dockerfile
      run: |
        cat > QT_API/Dockerfile << EOL
        FROM mcr.microsoft.com/dotnet/aspnet:8.0 AS base
        WORKDIR /app
        EXPOSE 80
        EXPOSE 443

        FROM mcr.microsoft.com/dotnet/sdk:8.0 AS build
        WORKDIR /src
        
        # Copy everything first
        COPY . .
        
        # Find the main project file
        RUN find . -name "*Website.csproj" | grep -i "quintessence" > project.txt
        RUN cat project.txt
        
        # Set the main project path
        RUN export MAIN_PROJ=\$(cat project.txt) && \\
            export MAIN_DIR=\$(dirname "\$MAIN_PROJ") && \\
            echo "Project: \$MAIN_PROJ" && \\
            echo "Directory: \$MAIN_DIR" && \\
            # Restore dependencies
            dotnet restore "\$MAIN_PROJ" && \\
            # Build the project
            cd "\$MAIN_DIR" && \\
            dotnet build -c Release -o /app/build && \\
            # Publish the project
            dotnet publish -c Release -o /app/publish
        
        # Final image
        FROM base AS final
        WORKDIR /app
        COPY --from=build /app/publish .
        ENTRYPOINT ["dotnet", "Quintessence Website.dll"]
        EOL
        
        echo "Created API Dockerfile:"
        cat QT_API/Dockerfile
    
    # Create a simple Frontend Dockerfile
    - name: Create Frontend Dockerfile
      run: |
        cat > QT_FrontEnd/Dockerfile << EOL
        # Build stage
        FROM node:18 AS build
        WORKDIR /app

        # Copy everything
        COPY . .
        
        # Install dependencies and build
        RUN npm ci
        RUN npm run build -- --configuration production

        # Production stage with Nginx
        FROM nginx:alpine
        COPY --from=build /app/dist/qt-front-end /usr/share/nginx/html

        # Create nginx configuration
        RUN echo 'server { \\
            listen 80; \\
            server_name localhost; \\
            root /usr/share/nginx/html; \\
            index index.html; \\
            location / { \\
                try_files \$uri \$uri/ /index.html; \\
            } \\
            location /api { \\
                proxy_pass http://api:80; \\
                proxy_http_version 1.1; \\
                proxy_set_header Upgrade \$http_upgrade; \\
                proxy_set_header Connection "upgrade"; \\
                proxy_set_header Host \$host; \\
                proxy_cache_bypass \$http_upgrade; \\
            } \\
        }' > /etc/nginx/conf.d/default.conf

        EXPOSE 80
        EOL
        
        echo "Created Frontend Dockerfile:"
        cat QT_FrontEnd/Dockerfile
    
    - name: Build and push API image
      uses: docker/build-push-action@v4
      with:
        context: ./QT_API
        file: ./QT_API/Dockerfile
        push: ${{ github.event_name != 'pull_request' }}
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/qt-api:latest, ${{ secrets.DOCKERHUB_USERNAME }}/qt-api:${{ github.sha }}
    
    - name: Build and push Frontend image
      uses: docker/build-push-action@v4
      with:
        context: ./QT_FrontEnd
        file: ./QT_FrontEnd/Dockerfile
        push: ${{ github.event_name != 'pull_request' }}
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/qt-frontend:latest, ${{ secrets.DOCKERHUB_USERNAME }}/qt-frontend:${{ github.sha }}
