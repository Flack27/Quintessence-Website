# Quintessence guild site — home server, fronted by Cloudflare Tunnel.
# frontend (Angular/nginx) is the public entry; it proxies /api to the .NET API.
# Local-build stack (no CI/CD), updated by hand:  docker compose up -d --build
name: quintessence

services:
  api:
    build:
      context: ./QT_API
      dockerfile: "Quintessence Website/Dockerfile"
    container_name: quintessence-api
    restart: unless-stopped
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      # Optional Qutie public-API proxy (per-game roster + events graph light up when set).
      - Qutie__ApiBase=${QUTIE_API_BASE:-}
      - Qutie__ApiKey=${QUTIE_API_KEY:-}
    volumes:
      # Discord OAuth ClientId/Secret + admin user-id allowlist (gitignored secrets).
      # The Discord app's redirect URI must be https://quintessence-eu.com/api/accounts/auth-callback
      - "./QT_API/Quintessence Website/appsettings.Production.json:/app/appsettings.Production.json:ro"
      - qt-appdata:/app/App_Data      # JSON data store (games/timeline/roster) — BACK UP
      - qt-uploads:/app/uploads        # uploaded game images — BACK UP
    expose:
      - "8080"
    # Also joins the qutie stack's network so the Qutie public-API call stays internal
    # (Qutie__ApiBase=http://qutie-api:8080) instead of hair-pinning out via qutie.app.
    networks: [quintessence-net, qutie-net]

  frontend:
    build:
      context: ./QT_FrontEnd/QT_FrontEnd
      args:
        BYPASS_BUDGET: "true"          # Angular production budget can trip on the bundle; relax it
    container_name: quintessence-frontend
    restart: unless-stopped
    depends_on:
      - api
    expose:
      - "80"
    networks: [quintessence-net]

  # Cloudflare Tunnel — public entrypoint (no router ports). Configure ONE public
  # hostname in the CF dashboard:  quintessence-eu.com -> http://frontend:80
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: quintessence-cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - frontend
      - api
    networks: [quintessence-net]

networks:
  quintessence-net:
    driver: bridge
  # The qutie stack's network (external) — lets quintessence-api reach qutie-api:8080
  # directly for the Qutie public-API proxy.
  qutie-net:
    external: true
    name: qutie_qutie-net

volumes:
  qt-appdata:
  qt-uploads:
