# Quintessence guild site — home server, fronted by Cloudflare Tunnel.
# frontend (Angular/nginx) is the public entry; it proxies /api to the .NET API.
# Local-build stack (no CI/CD), updated by hand:  docker compose up -d --build
name: quintessence

services:
  api:
    build:
      context: ./QT_API
      dockerfile: "Quintessence Website/Dockerfile"
    container_name: quintessence-api
    restart: unless-stopped
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      # Discord OAuth app (required — the API won't boot without these). Redirect URI
      # in the Discord app must be: https://quintessence-eu.com/api/accounts/auth-callback
      - Discord__ClientId=${DISCORD_CLIENT_ID}
      - Discord__ClientSecret=${DISCORD_CLIENT_SECRET}
      # Admin allowlist (Discord user ids). Add more as __1, __2, ...
      - Discord__AdminUserIds__0=${DISCORD_ADMIN_ID}
      # Optional Qutie public-API proxy (per-game roster + events graph light up when set).
      - Qutie__ApiBase=${QUTIE_API_BASE:-}
      - Qutie__ApiKey=${QUTIE_API_KEY:-}
    volumes:
      - qt-appdata:/app/App_Data      # JSON data store (games/timeline/roster) — BACK UP
      - qt-uploads:/app/uploads        # uploaded game images — BACK UP
    expose:
      - "8080"
    networks: [quintessence-net]

  frontend:
    build:
      context: ./QT_FrontEnd/QT_FrontEnd
      args:
        BYPASS_BUDGET: "true"          # Angular production budget can trip on the bundle; relax it
    container_name: quintessence-frontend
    restart: unless-stopped
    depends_on:
      - api
    expose:
      - "80"
    networks: [quintessence-net]

  # Cloudflare Tunnel — public entrypoint (no router ports). Configure ONE public
  # hostname in the CF dashboard:  quintessence-eu.com -> http://frontend:80
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: quintessence-cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - frontend
      - api
    networks: [quintessence-net]

networks:
  quintessence-net:
    driver: bridge

volumes:
  qt-appdata:
  qt-uploads:
