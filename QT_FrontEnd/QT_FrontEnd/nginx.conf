# Baked into the frontend image. Cloudflare terminates TLS and the tunnel forwards
# plain HTTP to this container, so there is no 443/SSL block (that was the old
# certbot setup). Public entry: quintessence-eu.com -> this nginx -> /api -> the API.
server {
    listen 80;
    listen [::]:80;
    server_name quintessence-eu.com www.quintessence-eu.com _;

    root /usr/share/nginx/html;
    index index.html;

    # Angular SPA routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API + Discord OAuth callback (/api/accounts/auth-callback) go to the .NET API.
    # The API's own routes include /api, so pass the full path (no strip).
    location /api/ {
        # Re-resolve the API's IP at request time via Docker's embedded DNS, so an API
        # redeploy (new container IP) doesn't leave nginx proxying a dead IP (502).
        resolver 127.0.0.11 valid=10s;
        set $qapi api;
        proxy_pass http://$qapi:8080$request_uri;
        proxy_http_version 1.1;

        # WebSocket upgrade support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # The public edge is always HTTPS via Cloudflare, so tell the API that — the
        # Discord OAuth redirect URI and secure cookies must resolve to https, not the
        # internal http hop.
        proxy_set_header X-Forwarded-Proto https;
    }

    # Health endpoint for the container healthcheck.
    location = /healthz { access_log off; return 200 "ok\n"; }
}
