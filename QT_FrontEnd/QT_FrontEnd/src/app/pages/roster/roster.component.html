<div class="roster-bg" aria-hidden="true"></div>
<div class="container">
  <div class="page-header">
    <div class="title">
      <h1>Roster</h1>
    </div>
    <div class="title-line"></div>
  </div>

  <div *ngIf="loading" class="loading">
    <p>Loading roster...</p>
  </div>

  <ng-container *ngIf="!loading">
    <!-- Main roster: members holding the roster role, labelled by their highest rank role -->
    <div class="invisible-container" *ngIf="members.length > 0">
      <div class="item" *ngFor="let member of members">
        <img *ngIf="avatarOk(member.avatarUrl)" [src]="member.avatarUrl" (error)="onAvatarError(member.avatarUrl)"
             class="item-icon" alt="{{ member.displayName }}'s avatar" />
        <div *ngIf="!avatarOk(member.avatarUrl)" class="item-icon item-icon-initials">{{ initials(member.displayName) }}</div>
        <p class="name">{{ member.displayName }}</p>
        <p class="role" [class.role-gradient]="roleGradient(member)" [style.background-image]="roleGradient(member)">{{ roleName(member) }}</p>
        <div class="game-tags" *ngIf="tokens(member).length > 0">
          <span class="game-tag" *ngFor="let token of tokens(member)" [title]="token.name" [style.borderColor]="token.color || null">
            <img *ngIf="token.imageUrl" [src]="token.imageUrl" alt="" />
            <span *ngIf="!token.imageUrl && token.emojiChar" class="game-e">{{ token.emojiChar }}</span>
            <i *ngIf="!token.imageUrl && !token.emojiChar" class="fas fa-gamepad" [style.color]="token.color || null"></i>
          </span>
        </div>
      </div>
    </div>

    <!-- Empty / unavailable state -->
    <div class="roster-coming-soon" *ngIf="members.length === 0">
      <i class="fas fa-users"></i>
      <h2>Roster coming soon</h2>
      <p>Our roster is being set up. Check back soon!</p>
    </div>
  </ng-container>
</div>
