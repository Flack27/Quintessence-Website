<!-- Submission Review Component -->
<body>
  <div class="container">
    <!-- User Info -->
    <div class="form-container">
      <div class="user-info" *ngIf="submission">
        <img [src]="submission.avatar" alt="User Avatar" class="user-avatar">
        <div class="user-details">
          <div class="user-header">
            <h2 class="user-name">{{ submission.userName }}</h2>
            <span class="status-badge" *ngIf="submission.approved !== null && submission.approved !== undefined"
                  [ngClass]="{
            'status-approved': submission.approved === true,
            'status-rejected': submission.approved === false}">
              <i class="fas" [ngClass]="{
            'fa-check-circle': submission.approved === true,
            'fa-times-circle': submission.approved === false}"></i>
              {{ submission.approved ? 'Approved' : 'Rejected' }}
            </span>
            <span class="admin-badge">
              <i class="fas fa-shield-alt"></i> Admin Review
            </span>
          </div>
          <p class="submission-date">
            <i class="fas fa-calendar-alt"></i>
            Submitted on: {{ submission.submitDate | date:'longDate' }}
          </p>
        </div>
      </div>

      <header>
        <div class="form-title-box">
          <h1 class="form-title">{{ form.title }}</h1>
        </div>
        <p class="form-description">{{ form.description }}</p>
      </header>

      <!-- Loading or Error Messages -->
      <div *ngIf="loading" class="loading">
        <div class="spinner"></div>
        <span>Loading submission...</span>
      </div>

      <div *ngIf="!loading && errorMessage" class="error">
        <i class="fas fa-exclamation-circle"></i> {{ errorMessage }}
      </div>

      <form *ngIf="!loading" #applicationForm="ngForm">
        <ul class="question-list">
          <li *ngFor="let question of form.questions; let i = index">
            <div class="question-item">
              <label class="question-text" for="question{{ i }}">
                {{ question.questionText }}
                <span *ngIf="question.isRequired" class="required">*</span>
                <span class="read-only-badge">
                  <i class="fas fa-lock"></i> Read-only
                </span>
              </label>

              <div class="answer-input-wrapper">
                <!-- Text Input -->
                <div *ngIf="isTextType(question)">
                  <textarea id="question{{ i }}"
                            class="answer-input auto-expand-textarea"
                            [(ngModel)]="question.answer.answer"
                            name="question{{ i }}"
                            [disabled]="true"
                            rows="1"></textarea>
                </div>

                <!-- Multiple Choice -->
                <div *ngIf="isMultipleChoice(question)">
                  <ul class="option-list">
                    <li *ngFor="let option of question.options; let j = index" class="option-input-wrapper">
                      <input type="checkbox"
                             id="option{{ i }}{{ j }}"
                             [(ngModel)]="option.selected"
                             name="option{{ i }}{{ j }}"
                             [disabled]="true"
                             [checked]="option.selected" />
                      <label for="option{{ i }}{{ j }}">{{ option.answerOption }}</label>
                    </li>
                  </ul>
                </div>

                <!-- Dropdown -->
                <div *ngIf="isDropdown(question)">
                  <select id="question{{ i }}"
                          [(ngModel)]="question.answer.answer"
                          name="question{{ i }}"
                          class="dropdown-input"
                          [disabled]="true">
                    <option *ngFor="let option of question.options" [value]="option.answerOption">
                      {{ option.answerOption }}
                    </option>
                  </select>
                </div>

                <!-- Single Choice -->
                <div *ngIf="isSingleChoice(question)">
                  <ul class="option-list">
                    <li *ngFor="let option of question.options; let j = index" class="option-input-wrapper">
                      <input type="radio"
                             id="option{{ i }}{{ j }}"
                             [(ngModel)]="question.answer.answer"
                             name="question{{ i }}"
                             [value]="option.answerOption"
                             [disabled]="true" />
                      <label for="option{{ i }}{{ j }}">{{ option.answerOption }}</label>
                    </li>
                  </ul>
                </div>
              </div>
            </div>
          </li>
        </ul>


        <!-- Admin Notes Section -->
        <div class="admin-notes-section">
          <div class="admin-notes-header">
            <h3 class="admin-notes-title">
              <i class="fas fa-sticky-note"></i> Admin Notes
              <span class="notes-status" *ngIf="notesStatus">{{ notesStatus }}</span>
            </h3>
          </div>
          <div class="admin-notes-content">
            <textarea #descriptionTextarea
                      name="adminNotes"
                      [(ngModel)]="userDescription"
                      (input)="onDescriptionChange()"
                      (focus)="onDescriptionFocus()"
                      (blur)="onDescriptionBlur()"
                      class="admin-notes-textarea"
                      placeholder="Add your notes about this applicant here. Notes are saved automatically.">
            </textarea>
          </div>
        </div>

        <!-- Admin Action Buttons -->
        <div class="admin-actions">
          <button type="button"
                  class="approve-btn"
                  [class.selected]="submission.approved === true"
                  [class.active]="submission.approved !== true"
                  (click)="submission.approved !== true && approveSubmission()">
            <i class="fas fa-check-circle"></i> Approve Application
          </button>
          <button type="button"
                  class="reject-btn"
                  [class.selected]="submission.approved === false"
                  [class.active]="submission.approved !== false"
                  (click)="submission.approved !== false && rejectSubmission()">
            <i class="fas fa-times-circle"></i> Reject Application
          </button>
        </div>
      </form>
    </div>
  </div>
</body>
