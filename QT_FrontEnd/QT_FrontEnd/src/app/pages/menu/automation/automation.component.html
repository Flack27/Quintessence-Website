<!-- Automation Component HTML -->
<body>
  <div class="container">
    <header>
      <div class="title">
        <h1>Automation Config</h1>
      </div>
      <div class="title-line title-line-xxl"></div>
    </header>
    <!-- Automation Configuration Table -->
    <div class="table-container">
      <table class="config-table">
        <thead>
          <tr>
            <th>Check Delay (Minutes)</th>
            <th>Auto Remove Absent Users</th>
            <th>Auto Remove Late Users</th>
            <th>Ping Users</th>
            <th>Delete</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let config of automationConfigs">
            <td>{{ config.checkDelayMinutes }}</td>
            <td>{{ config.autoRemoveAbsentUsers ? 'Yes' : 'No' }}</td>
            <td>{{ config.autoRemoveLateUsers ? 'Yes' : 'No' }}</td>
            <td>{{ config.pingUsers ? 'Yes' : 'No' }}</td>
            <td>
              <button class="remove-btn" (click)="deleteConfig(config.id)" aria-label="Delete configuration">
                &times;
              </button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>

    <!-- Add Automation Configuration Form -->
    <div class="form-section">
      <h2 class="form-section-title">Add New Configuration</h2>
      <form (ngSubmit)="addConfig()">
        <div class="config-section">
          <div class="config1">
            <div class="form-group">
              <label for="checkDelay">Check Delay (Minutes):</label>
              <input id="checkDelay"
                     type="number"
                     [(ngModel)]="newConfig.CheckDelayMinutes"
                     name="checkDelay"
                     placeholder="Enter check delay in minutes"
                     required />
            </div>
            <div class="form-group">
              <label for="autoRemoveAbsent">Auto Remove Absent Users:</label>
              <select id="autoRemoveAbsent"
                      [(ngModel)]="newConfig.AutoRemoveAbsentUsers"
                      name="autoRemoveAbsent"
                      required>
                <option [ngValue]="false">No</option>
                <option [ngValue]="true">Yes</option>
              </select>
            </div>
          </div>
          <div class="config2">
            <div class="form-group">
              <label for="autoRemoveLate">Auto Remove Late Users:</label>
              <select id="autoRemoveLate"
                      [(ngModel)]="newConfig.AutoRemoveLateUsers"
                      name="autoRemoveLate"
                      required>
                <option [ngValue]="false">No</option>
                <option [ngValue]="true">Yes</option>
              </select>
            </div>
            <div class="form-group">
              <label for="pingUsers">Ping Users:</label>
              <select id="pingUsers"
                      [(ngModel)]="newConfig.PingUsers"
                      name="pingUsers"
                      required>
                <option [ngValue]="false">No</option>
                <option [ngValue]="true">Yes</option>
              </select>
            </div>
          </div>
        </div>
        <div class="button-container">
          <button class="standard-button" type="submit">
            <i class="fas fa-plus-circle"></i> Add Configuration
          </button>
        </div>
      </form>
    </div>
  </div>
</body>
