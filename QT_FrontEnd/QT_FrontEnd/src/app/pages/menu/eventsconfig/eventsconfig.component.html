<!-- Events Config Component HTML -->
<body>
  <div class="container">
    <header>
      <div class="title">
        <h1>Events Config</h1>
      </div>
      <div class="title-line title-line-xl"></div>
    </header>

    <!-- Events Configuration Table -->
    <div class="table-container">
      <table class="config-table">
        <thead>
          <tr>
            <th>Channel Name</th>
            <th>Role Name</th>
            <th>Game Name</th>
            <th>Sheet ID</th>
            <th>Delete</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let config of eventConfigs">
            <td>{{ config.channelName }}</td>
            <td>{{ config.roleName }}</td>
            <td>{{ config.gameName }}</td>
            <td>{{ config.sheetId }}</td>
            <td>
              <button class="remove-btn" (click)="deleteConfig(config.channelId)" aria-label="Delete configuration">
                &times;
              </button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>

    <!-- Add Configuration Form -->
    <div class="form-section">
      <h2 class="form-section-title">Add New Event Configuration</h2>

      <form (ngSubmit)="addConfig()">
        <div class="config-section">
          <div class="config1">
            <div class="form-group">
              <label for="channel">Event Channel:</label>
              <select id="channel" [(ngModel)]="newConfig.ChannelId" name="channel" required>
                <option value="" disabled selected>Select channel</option>
                <option *ngFor="let channel of channels" [value]="channel.channelId">
                  {{ channel.channelName }}
                </option>
              </select>
            </div>
            <div class="form-group">
              <label for="role">Roster Role:</label>
              <select id="role" [(ngModel)]="newConfig.RoleId" name="role" required>
                <option value="" disabled selected>Select role</option>
                <option *ngFor="let role of roles" [value]="role.roleId">
                  {{ role.roleName }}
                </option>
              </select>
            </div>
          </div>
          <div class="config2">
            <div class="form-group">
              <label for="game">Game:</label>
              <select id="game" [(ngModel)]="newConfig.GameId" name="game" required>
                <option value="" disabled selected>Select game</option>
                <option *ngFor="let game of games" [value]="game.gameId">
                  {{ game.gameName }}
                </option>
              </select>
            </div>
            <div class="form-group">
              <label for="sheetId">Sheet Tab ID:</label>
              <input id="sheetId"
                     type="number"
                     [(ngModel)]="newConfig.SheetId"
                     name="sheetId"
                     placeholder="Optional field – only fill in if applicable"
                     required />
            </div>
          </div>
        </div>
        <div class="button-container">
          <button class="standard-button" type="submit">
            <i class="fas fa-plus-circle"></i> Add Configuration
          </button>
        </div>
      </form>
    </div>
  </div>
</body>
