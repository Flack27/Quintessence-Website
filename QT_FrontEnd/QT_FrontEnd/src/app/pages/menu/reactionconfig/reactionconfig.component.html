<!-- Reaction Config Component HTML -->
<body>
  <div class="container">
    <header>
      <div class="title">
        <h1>Reaction Config</h1>
      </div>
      <div class="title-line title-line-xl"></div>
    </header>

    <!-- Configuration Table -->
    <div class="table-container">
      <table class="config-table">
        <thead>
          <tr>
            <th>Emoji</th>
            <th>Moderator Role</th>
            <th>Verified Role</th>
            <th>Channel Name</th>
            <th>Delete</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let config of reactionConfigs">
            <td>{{ config.emoji }}</td>
            <td>{{ config.moderatorRoleName }}</td>
            <td>{{ config.verificationRoleName }}</td>
            <td>{{ config.onlyOneChannelName }}</td>
            <td>
              <button class="remove-btn" (click)="deleteConfig(config.id)" aria-label="Delete configuration">
                &times;
              </button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>

    <!-- Configuration Form -->
    <div class="form-section">
      <h2 class="form-section-title">Add New Configuration</h2>

      <form (ngSubmit)="addConfig()">
        <div class="config-section">
          <div class="config1">
            <div class="form-group">
              <label for="emoji">Emoji:</label>
              <input id="emoji"
                     type="text"
                     [(ngModel)]="newConfig.Emoji"
                     name="emoji"
                     placeholder="Enter emoji"
                     required />
            </div>
            <div class="form-group">
              <label for="mrole">Moderator Role:</label>
              <select id="mrole" [(ngModel)]="newConfig.ModeratorRoleId" name="mrole" required>
                <option value="" disabled selected>Select moderator role</option>
                <option *ngFor="let role of roles" [value]="role.roleId">
                  {{ role.roleName }}
                </option>
              </select>
            </div>
          </div>
          <div class="config2">
            <div class="form-group">
              <label for="vrole">Verified Role:</label>
              <select id="vrole" [(ngModel)]="newConfig.VerificationRoleId" name="vrole" required>
                <option value="" disabled selected>Select verified role</option>
                <option *ngFor="let role of roles" [value]="role.roleId">
                  {{ role.roleName }}
                </option>
              </select>
            </div>
            <div class="form-group">
              <label for="channel">Channel:</label>
              <select id="channel" [(ngModel)]="newConfig.OnlyOneChannelId" name="channel" required>
                <option value="" disabled selected>Select channel</option>
                <option *ngFor="let channel of channels" [value]="channel.channelId">
                  {{ channel.channelName }}
                </option>
              </select>
            </div>
          </div>
        </div>
        <div class="button-container">
          <button class="standard-button" type="submit">
            <i class="fas fa-plus-circle"></i> Add Configuration
          </button>
        </div>
      </form>
    </div>
  </div>
</body>
