<!-- Event Categories Component HTML -->
<body>
  <div class="container">
    <header>
      <div class="title">
        <h1>Event Activity</h1>
      </div>
      <div class="title-line title-line-xl"></div>
    </header>

    <!-- Loading Animation -->
    <div *ngIf="loading" class="loading">
      <div class="spinner"></div>
      <span>Loading event categories...</span>
    </div>

    <!-- Error Message -->
    <div *ngIf="errorMessage" class="error">
      <i class="fas fa-exclamation-circle"></i> {{ errorMessage }}
    </div>

    <!-- Channel List -->
    <section *ngIf="!loading && channels" class="channels-section">
      <ul class="channel-list">
        <li *ngFor="let channel of channels"
            class="channel-item"
            (click)="selectChannel(channel.channelId)">
          <div class="channel-content">
            <i class="fas fa-calendar-alt channel-icon"></i>
            <h3>{{ channel.channelName }}</h3>
            <p>Click to view all events in this category</p>
          </div>
        </li>
      </ul>
    </section>

    <!-- No Channels Found -->
    <div *ngIf="!loading && (!channels || channels.length === 0)" class="no-messages">
      <i class="fas fa-calendar-times"></i>
      <p>No event categories found.</p>
    </div>
  </div>
</body>
