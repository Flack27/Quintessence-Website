<!-- Events List Component HTML -->
<body>
<div class="container">
  <header>
    <div class="title">
      <h1>Events</h1>
      </div>
      <div class="title-line"></div>
</header>

  <!-- Search Bar -->
  <div class="search-container">
    <input type="text"
           [(ngModel)]="searchQuery"
           class="search-bar"
           placeholder="Search by title or date..."
           (input)="filterEvents()" />
  </div>

  <!-- Loading Animation -->
  <div *ngIf="loading" class="loading">
    <div class="spinner"></div>
    <span>Loading events...</span>
  </div>

  <!-- Error Message -->
  <div *ngIf="errorMessage" class="error">
    <i class="fas fa-exclamation-circle"></i> {{ errorMessage }}
  </div>

  <!-- Events List -->
  <section *ngIf="!loading && filteredEvents" class="events-section">
    <ul *ngIf="filteredEvents.length > 0; else noEvents">
      <li *ngFor="let event of filteredEvents" class="event-item" (click)="selectEvent(event)">
        <span class="event-title">
          <i class="fas fa-calendar-day event-icon"></i>
          {{ event.eventTitle }}
        </span>
        <span class="event-date">
          <i class="fas fa-clock date-icon"></i>
          {{ event.formattedDate }}
        </span>
      </li>
    </ul>
    <ng-template #noEvents>
      <div class="no-events">
        <i class="fas fa-calendar-times"></i>
        <p>No events found for this category.</p>
        <button *ngIf="searchQuery" class="standard-button" (click)="clearSearch()">
          Clear Search
        </button>
      </div>
    </ng-template>
  </section>
</div>
  </body>
