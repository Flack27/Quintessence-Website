<!-- Message Activity Component HTML -->
<body>
<div class="container">
  <header>
    <div class="title">
      <h1>Message Activity</h1>
    </div>
    <div class="title-line title-line-xl"></div>
  </header>

  <!-- Search Bar -->
  <div class="search-container">
    <input type="text"
           [(ngModel)]="searchQuery"
           class="search-bar"
           placeholder="Search users..."
           (input)="filterMessages()" />
  </div>

  <!-- Loading Animation -->
  <div *ngIf="loading" class="loading">
    <div class="spinner"></div>
    <span>Loading message data...</span>
  </div>

  <!-- Error Message -->
  <div *ngIf="errorMessage" class="error">
    <i class="fas fa-exclamation-circle"></i> {{ errorMessage }}
  </div>

  <!-- Message Activity Table -->
  <div *ngIf="!loading && filteredMessages.length > 0" class="table-container">
    <table class="message-table">
      <thead>
        <tr>
          <th>Rank</th>
          <th>User</th>
          <th>Display Name</th>
          <th>Level</th>
          <th>Message Count</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let message of paginatedVoice">
          <td [ngClass]="'rank-' + message.rank">{{ message.rank }}</td>
          <td class="avatar-cell">
            <img [src]="message.avatar" alt="Avatar" class="avatar">
          </td>
          <td>{{ message.displayname }}</td>
          <td class="message-level">{{ message.messageLevel }}</td>
          <td class="message-count">{{ message.messagecount }}</td>
        </tr>
      </tbody>
    </table>
  </div>

  <!-- Pagination Controls -->
  <div *ngIf="!loading && filteredMessages.length > itemsPerPage" class="pagination-controls">
    <button (click)="previousPage()" [disabled]="currentPage === 1">
      <i class="fas fa-chevron-left"></i> Previous
    </button>
    <span>Page {{ currentPage }} of {{ totalPages }}</span>
    <button (click)="nextPage()" [disabled]="currentPage === totalPages">
      Next <i class="fas fa-chevron-right"></i>
    </button>
  </div>

  <!-- No Message Data Found -->
  <div *ngIf="!loading && messages.length === 0" class="no-messages">
    <i class="fas fa-comment-slash"></i>
    <p>No message activity data found.</p>
    <button *ngIf="searchQuery" class="standard-button" (click)="clearSearch()">
      Clear Search
    </button>
  </div>
</div>
  </body>
