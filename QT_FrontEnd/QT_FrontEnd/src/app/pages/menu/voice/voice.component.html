<!-- Voice Activity Component HTML -->
<body>
<div class="container">
  <header>
    <div class="title">
      <h1>Voice Activity</h1>
    </div>
    <div class="title-line title-line-xl"></div>
  </header>

  <!-- Search Bar -->
  <div class="search-container">
    <input type="text"
           [(ngModel)]="searchQuery"
           class="search-bar"
           placeholder="Search users..."
           (input)="filterVoice()" />
  </div>

  <!-- Loading Animation -->
  <div *ngIf="loading" class="loading">
    <div class="spinner"></div>
    <span>Loading voice data...</span>
  </div>

  <!-- Error Message -->
  <div *ngIf="errorMessage" class="error">
    <i class="fas fa-exclamation-circle"></i> {{ errorMessage }}
  </div>

  <!-- Voice Activity Table -->
  <div *ngIf="!loading && filteredVoice.length > 0" class="table-container">
    <table class="message-table">
      <thead>
        <tr>
          <th>Rank</th>
          <th>User</th>
          <th>Display Name</th>
          <th>Level</th>
          <th>Voice Time</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let voice of paginatedVoice">
          <td [ngClass]="'rank-' + voice.rank">{{ voice.rank }}</td>
          <td class="avatar-cell">
            <img [src]="voice.avatar" alt="Avatar" class="avatar">
          </td>
          <td>{{ voice.displayname }}</td>
          <td class="voice-level">{{ voice.voiceLevel }}</td>
          <td class="voice-time">{{ voice.totalVoiceTime }}h</td>
        </tr>
      </tbody>
    </table>
  </div>

  <!-- Pagination Controls -->
  <div *ngIf="!loading && filteredVoice.length > itemsPerPage" class="pagination-controls">
    <button (click)="previousPage()" [disabled]="currentPage === 1">
      <i class="fas fa-chevron-left"></i> Previous
    </button>
    <span>Page {{ currentPage }} of {{ totalPages }}</span>
    <button (click)="nextPage()" [disabled]="currentPage === totalPages">
      Next <i class="fas fa-chevron-right"></i>
    </button>
  </div>

  <!-- No Voice Data Found -->
  <div *ngIf="!loading && voice.length === 0" class="no-messages">
    <i class="fas fa-microphone-slash"></i>
    <p>No voice activity data found.</p>
    <button *ngIf="searchQuery" class="standard-button" (click)="clearSearch()">
      Clear Search
    </button>
  </div>
</div>
  </body>
