<!-- XP Config Component HTML -->
<body>
  <div class="container">
    <header>
      <div class="title">
        <h1>XP Configuration</h1>
      </div>
      <div class="title-line title-line-xl"></div>
    </header>

    <!-- Loading Animation -->
    <div *ngIf="loading" class="loading">
      <div class="spinner"></div>
      <span>Loading XP configuration...</span>
    </div>

    <!-- Error Message -->
    <div *ngIf="errorMessage" class="error">
      <i class="fas fa-exclamation-circle"></i> {{ errorMessage }}
    </div>

    <!-- XP Config Form -->
    <form *ngIf="!loading" (ngSubmit)="saveConfig()" class="xp-config-form">
      <div class="form-row">
        <label for="minMessageXP">Min Message XP:</label>
        <input type="number"
               id="minMessageXP"
               [(ngModel)]="xpConfig.messageMinXP"
               name="minMessageXP"
               required />
        <label for="minVoiceXP">Min Voice XP:</label>
        <input type="number"
               id="minVoiceXP"
               [(ngModel)]="xpConfig.voiceMinXP"
               name="minVoiceXP"
               required />
      </div>

      <div class="form-row">
        <label for="maxMessageXP">Max Message XP:</label>
        <input type="number"
               id="maxMessageXP"
               [(ngModel)]="xpConfig.messageMaxXP"
               name="maxMessageXP"
               required />
        <label for="maxVoiceXP">Max Voice XP:</label>
        <input type="number"
               id="maxVoiceXP"
               [(ngModel)]="xpConfig.voiceMaxXP"
               name="maxVoiceXP"
               required />
      </div>

      <div class="form-row">
        <label for="messageCooldown">Message Cooldown:</label>
        <input type="number"
               id="messageCooldown"
               [(ngModel)]="xpConfig.messageCooldown"
               name="messageCooldown"
               required />
        <label for="voiceCooldown">Voice Cooldown:</label>
        <input type="number"
               id="voiceCooldown"
               [(ngModel)]="xpConfig.voiceCooldown"
               name="voiceCooldown"
               required />
      </div>

      <div class="button-container">
        <button type="submit" class="standard-button">
          <i class="fas fa-save"></i> Save Configuration
        </button>
      </div>
    </form>

    <div class="config-section">
      <!-- Message Level Configurations -->
      <div class="message-config">
        <h2>Message Level Up Config</h2>
        <div class="table-container">
          <table class="forms-table">
            <thead>
              <tr>
                <th>Level</th>
                <th>Role Name</th>
                <th>Delete</th>
              </tr>
            </thead>
            <tbody>
              <tr *ngFor="let config of messageConfigs">
                <td>{{ config.level }}</td>
                <td>{{ config.roleName }}</td>
                <td>
                  <button class="remove-btn" (click)="deleteMessageConfig(config.level)" aria-label="Delete config">
                    &times;
                  </button>
                </td>
              </tr>
            </tbody>
          </table>
        </div>

        <form (ngSubmit)="addMessageConfig()">
          <div class="form-group">
            <label for="messageLevel">Required Level:</label>
            <input class="addition"
                   id="messageLevel"
                   [(ngModel)]="newMessageConfig.level"
                   name="messageLevel"
                   type="number"
                   placeholder="Enter level number"
                   required />
          </div>
          <div class="form-group">
            <label for="messageRole">On Level Role:</label>
            <select class="addition" id="messageRole" [(ngModel)]="newMessageConfig.roleId" name="messageRole" required>
              <option value="" disabled selected>Select a role</option>
              <option *ngFor="let role of roles" [value]="role.roleId">{{ role.roleName }}</option>
            </select>
          </div>
          <div class="button-container">
            <button class="standard-button" type="submit">
              <i class="fas fa-plus-circle"></i> Add Level
            </button>
          </div>
        </form>
      </div>

      <!-- Voice Level Configurations -->
      <div class="voice-config">
        <h2>Voice Level Up Config</h2>
        <div class="table-container">
          <table class="forms-table">
            <thead>
              <tr>
                <th>Level</th>
                <th>Role Name</th>
                <th>Delete</th>
              </tr>
            </thead>
            <tbody>
              <tr *ngFor="let config of voiceConfigs">
                <td>{{ config.level }}</td>
                <td>{{ config.roleName }}</td>
                <td>
                  <button class="remove-btn" (click)="deleteVoiceConfig(config.level)" aria-label="Delete config">
                    &times;
                  </button>
                </td>
              </tr>
            </tbody>
          </table>
        </div>

        <form (ngSubmit)="addVoiceConfig()">
          <div class="form-group">
            <label for="voiceLevel">Required Level:</label>
            <input class="addition"
                   id="voiceLevel"
                   [(ngModel)]="newVoiceConfig.level"
                   name="voiceLevel"
                   type="number"
                   placeholder="Enter level number"
                   required />
          </div>
          <div class="form-group">
            <label for="voiceRole">On Level Role:</label>
            <select class="addition" id="voiceRole" [(ngModel)]="newVoiceConfig.roleId" name="voiceRole" required>
              <option value="" disabled selected>Select a role</option>
              <option *ngFor="let role of roles" [value]="role.roleId">{{ role.roleName }}</option>
            </select>
          </div>

          <div class="button-container">
            <button class="standard-button" type="submit">
              <i class="fas fa-plus-circle"></i> Add Level
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>
</body>
