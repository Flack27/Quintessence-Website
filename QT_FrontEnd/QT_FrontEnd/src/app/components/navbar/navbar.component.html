<nav>
  <div class="navbar-container">
    <!-- Logo on the left -->
    <div class="logo">
      <a routerLink="/">
        <img src="/assets/logo.png" alt="Quintessence Logo" />
      </a>
    </div>
    <!-- Mobile Menu Toggle -->
    <div class="mobile-toggle" (click)="toggleMobileMenu()">
      <i class="fas" [ngClass]="isMobileMenuOpen ? 'fa-times' : 'fa-bars'"></i>
    </div>
    <!-- Navigation Links - right aligned -->
    <ul [ngClass]="{'mobile-open': isMobileMenuOpen}">
      <li><a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" (click)="closeMobileMenu()">Home</a></li>
      <li><a [href]="applyUrl" (click)="closeMobileMenu()">Apply</a></li>
      <li><a routerLink="/games" routerLinkActive="active" (click)="closeMobileMenu()">Games</a></li>
      <li><a routerLink="/roster" routerLinkActive="active" (click)="closeMobileMenu()">Roster</a></li>
      <!-- No login link: admins use the hidden /login route -->
      <!-- User Dropdown (only ever visible to logged-in admins) -->
      <li class="user-info" *ngIf="user?.isAuthenticated">
        <div class="user" (click)="toggleDropdown()">
          <img [src]="user?.claims?.avatar_url"
               alt="User Avatar"
               class="avatar" />
          <span>{{ user?.claims?.display_name }}</span>
        </div>
        <ul class="dropdown">
          <li><a (click)="logout(); closeMobileMenu()">Logout</a></li>
        </ul>
      </li>
    </ul>
  </div>
</nav>
